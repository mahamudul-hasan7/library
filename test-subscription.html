<!DOCTYPE html>
<html>
<head>
    <title>Test Subscription API</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test-box { border: 1px solid #ccc; padding: 15px; margin: 10px 0; }
        button { padding: 10px 20px; background: #0066cc; color: white; border: none; cursor: pointer; }
        pre { background: #f0f0f0; padding: 10px; overflow: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Subscription API Test</h1>
    
    <div class="test-box">
        <h3>Test Subscription Update</h3>
        <p>Click below to test updating subscription to 'Premium'</p>
        <button onclick="testSubscriptionUpdate()">Test Premium Upgrade</button>
        <pre id="result"></pre>
    </div>

    <script>
        async function testSubscriptionUpdate() {
            const resultEl = document.getElementById("result");
            resultEl.textContent = "Sending request...";

            try {
                const response = await fetch("./backend/api/subscription.php", {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        plan: "Premium",
                        billingCycle: "monthly",
                        price: 399,
                        planType: "premium"
                    })
                });

                const result = await response.json();
                
                let html = "Response Status: " + response.status + "\n\n";
                html += "Response Body:\n" + JSON.stringify(result, null, 2);
                
                if (result.success) {
                    html = "<span class='success'>✓ SUCCESS</span>\n" + html;
                    if (result.user && result.user.plan_type) {
                        html += "\n\nUpdated plan_type: " + result.user.plan_type;
                    }
                } else {
                    html = "<span class='error'>✗ FAILED</span>\n" + html;
                    if (result.error) {
                        html += "\n\nError: " + result.error;
                    }
                }
                
                resultEl.innerHTML = html;
            } catch (error) {
                resultEl.innerHTML = "<span class='error'>Network Error:</span>\n" + error.message;
            }
        }
    </script>
</body>
</html>
